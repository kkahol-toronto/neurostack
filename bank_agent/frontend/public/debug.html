<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Debug Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 3px; white-space: pre-wrap; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <h1>Banking Agent API Debug Tool</h1>
    
    <div class="section">
        <h3>1. Test Backend Connection</h3>
        <button onclick="testBackend()">Test Backend</button>
        <div id="backendResult" class="result"></div>
    </div>

    <div class="section">
        <h3>2. Test Authentication</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div class="section">
        <h3>3. Test Customer Data API</h3>
        <button onclick="testCustomerData()">Test Customer Data</button>
        <div id="customerDataResult" class="result"></div>
    </div>

    <div class="section">
        <h3>4. Check Local Storage</h3>
        <button onclick="checkLocalStorage()">Check Storage</button>
        <div id="storageResult" class="result"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        async function testBackend() {
            const resultDiv = document.getElementById('backendResult');
            try {
                const response = await fetch(`${API_BASE_URL}/docs`);
                if (response.ok) {
                    resultDiv.innerHTML = '✅ Backend is running and accessible';
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = `❌ Backend responded with status: ${response.status}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Backend connection failed: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'analyst',
                        password: 'analyst123'
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    resultDiv.innerHTML = `✅ Login successful!\nToken: ${data.access_token.substring(0, 50)}...\nUser: ${data.username} (${data.role})`;
                    resultDiv.className = 'result success';
                    
                    // Store the token
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify({
                        user_id: data.user_id,
                        username: data.username,
                        first_name: data.first_name,
                        last_name: data.last_name,
                        role: data.role,
                        department: data.department
                    }));
                } else {
                    resultDiv.innerHTML = `❌ Login failed: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Login request failed: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function testCustomerData() {
            const resultDiv = document.getElementById('customerDataResult');
            const token = localStorage.getItem('token');
            
            if (!token) {
                resultDiv.innerHTML = '❌ No authentication token found. Please login first.';
                resultDiv.className = 'result error';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/customer-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        customer_id: 1,
                        include_summary: true
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = `✅ Customer data retrieved successfully!\nCustomer ID: ${data.customer_id}\nData Sources: ${Object.keys(data.data).length}\nSummary: ${data.summary ? 'Generated' : 'Not available'}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = `❌ Customer data request failed: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Customer data request failed: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        function checkLocalStorage() {
            const resultDiv = document.getElementById('storageResult');
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                const userData = JSON.parse(user);
                resultDiv.innerHTML = `✅ Local storage contains:\nToken: ${token.substring(0, 50)}...\nUser: ${userData.username} (${userData.role})`;
                resultDiv.className = 'result success';
            } else {
                resultDiv.innerHTML = '❌ No authentication data found in local storage';
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
